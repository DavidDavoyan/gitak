<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gitak · Գիտակ</title>
<style>
  :root {
    /* always-light theme, styled after the bright SaaS admin reference */
    color-scheme: light;
    --page: #f4f6f8; --surface: #ffffff; --sidebar: #fafbfc;
    --ink: #17191c; --ink-2: #4b5563; --muted: #8a919b;
    --grid: #edeff2; --axis: #d3d8de; --border: #e7eaee;
    --s1: #2172d3; --s1-soft: #9dc4f0; --s1-softer: #d8e8fa;
    --s2: #1e8e3e; --s3: #e87ba4; --s4: #eda100; --s5: #1baf7a;
    --s6: #eb6834; --s7: #4a3aa7; --s8: #e34948;
    --good-text: #177a52; --status-good: #22a06b; --status-warn: #f5a623;
    --status-serious: #ec835a; --status-crit: #d64545;
    --neutral-mid: #f0f2f5;
    --accent-soft: rgba(33, 114, 211, .09);
    --shadow: 0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
    --shadow-lg: 0 4px 6px rgba(16,24,40,.05), 0 12px 24px -8px rgba(16,24,40,.14);
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--page); color: var(--ink);
    font: 14px/1.5 Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  svg.ic { width: 18px; height: 18px; flex: none; }

  /* ---------- app shell: sidebar + topbar ---------- */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 236px; flex: none; background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 6px;
    position: sticky; top: 0; height: 100vh; padding: 18px 12px 14px;
    z-index: 30;
  }
  .brand { display: flex; align-items: center; gap: 10px; padding: 0 8px 14px; }
  .brand .mark {
    width: 36px; height: 36px; border-radius: 11px; flex: none;
    background: linear-gradient(135deg, var(--s1), var(--s7));
    color: #fff; font-size: 19px; font-weight: 800;
    display: grid; place-items: center;
  }
  .brand .b-name { font-size: 16.5px; font-weight: 750; line-height: 1.15; }
  .brand small { display: block; color: var(--muted); font-size: 10.5px; font-weight: 400; }
  #nav { display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
  #nav a {
    display: flex; align-items: center; gap: 11px;
    padding: 9px 11px; border-radius: 10px; text-decoration: none;
    color: var(--ink-2); font-weight: 550; font-size: 13.5px;
    border: 1px solid transparent;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #nav a svg { color: var(--muted); }
  #nav a:hover { background: var(--neutral-mid); color: var(--ink); }
  #nav a.on { background: var(--surface); color: var(--ink);
    border-color: var(--border); box-shadow: var(--shadow); }
  #nav a.on svg { color: var(--s1); }
  .nav-sec { color: var(--muted); font-size: 11px; font-weight: 650;
    letter-spacing: .4px; text-transform: uppercase; padding: 14px 11px 4px; }
  .side-foot { margin-top: auto; border-top: 1px solid var(--border); padding-top: 10px; }
  .user-card { display: flex; align-items: center; gap: 10px; padding: 6px 8px; }
  .user-card .u-meta { min-width: 0; flex: 1; }
  .user-card .u-name { font-size: 13px; font-weight: 600; white-space: nowrap;
                       overflow: hidden; text-overflow: ellipsis; }
  .user-card .u-role { font-size: 11.5px; color: var(--muted); }
  .icon-btn {
    border: 0; background: transparent; color: var(--muted); cursor: pointer;
    width: 32px; height: 32px; border-radius: 9px;
    display: grid; place-items: center; flex: none;
  }
  .icon-btn:hover { background: var(--neutral-mid); color: var(--ink); }

  .shell { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .topbar {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 26px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 20;
  }
  .menu-btn { display: none; }
  .period { color: var(--ink-2); font-size: 12.5px; min-width: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .topsearch { position: relative; }
  .topsearch .ts-wrap { display: flex; align-items: center; gap: 8px;
    background: var(--page); border: 1px solid var(--border); border-radius: 10px;
    padding: 6px 11px; width: 230px; color: var(--muted); }
  .topsearch input { border: 0; background: transparent; color: var(--ink);
    font: inherit; font-size: 13px; width: 100%; outline: none; }
  .topsearch .ts-wrap:focus-within { border-color: var(--s1); }
  .ts-drop {
    position: absolute; top: calc(100% + 6px); right: 0; width: 290px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: var(--shadow-lg); overflow: hidden;
    max-height: 330px; overflow-y: auto; z-index: 40;
  }
  .ts-drop .ts-item { display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; cursor: pointer; }
  .ts-drop .ts-item:hover { background: var(--neutral-mid); }
  .ts-drop .ts-empty { padding: 10px 12px; color: var(--muted); font-size: 12.5px; }
  .lang { display: flex; border: 1px solid var(--border); border-radius: 9px;
          overflow: hidden; background: var(--page); }
  .lang button {
    border: 0; background: transparent; color: var(--ink-2);
    font: inherit; font-size: 11.5px; font-weight: 650; padding: 6px 10px; cursor: pointer;
  }
  .lang button.on { background: var(--s1); color: #fff; }

  main { width: 100%; max-width: 1160px; margin: 0 auto; padding: 24px 26px 70px; }

  /* login state hides the chrome */
  body:not(.authed) .sidebar, body:not(.authed) .topbar { display: none; }
  body:not(.authed) main { max-width: none; padding: 0; }

  /* mobile */
  .backdrop { display: none; }
  @media (max-width: 920px) {
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0;
      transform: translateX(-105%); transition: transform .2s ease;
      box-shadow: var(--shadow-lg); }
    .sidebar.open { transform: none; }
    .menu-btn { display: grid; }
    .backdrop.show { display: block; position: fixed; inset: 0;
      background: rgba(0,0,0,.42); z-index: 25; }
    .topsearch .ts-wrap { width: 150px; }
    main { padding: 18px 16px 60px; }
  }

  /* ---------- typography & cards ---------- */
  h2 { font-size: 16.5px; font-weight: 700; letter-spacing: -.1px; margin: 28px 0 12px; }
  h2 .muted { font-weight: 400; }
  h2:first-child { margin-top: 0; }
  .page-head { display: flex; align-items: center; gap: 14px; margin: 2px 0 18px; }
  .page-head h2 { margin: 0; font-size: 19px; }
  .page-head .ph-sub { color: var(--muted); font-size: 12.5px; margin-top: 1px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow);
  }
  .card h3 { margin: 0 0 12px; font-size: 13.5px; font-weight: 650; }
  .card .note { color: var(--muted); font-size: 12px; margin-top: 10px; }
  .cards2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 800px) { .cards2 { grid-template-columns: 1fr; } }

  /* ---------- stat tiles ---------- */
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(182px,1fr)); gap: 12px; }
  .tile {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow);
  }
  .tile .t-top { display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 12.5px; font-weight: 550; margin-bottom: 9px; }
  .tile .t-top svg { width: 16px; height: 16px; color: var(--muted); }
  .tile .v { font-size: 23px; font-weight: 750; letter-spacing: -.4px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .tile .s { color: var(--muted); font-size: 12px; margin-top: 5px; }

  /* ---------- people ---------- */
  .avatar {
    width: 28px; height: 28px; border-radius: 50%; flex: none;
    display: inline-grid; place-items: center;
    font-size: 10.5px; font-weight: 750; letter-spacing: .2px;
  }
  .avatar.lg { width: 44px; height: 44px; font-size: 15px; border-radius: 14px; }
  .person { display: inline-flex; align-items: center; gap: 9px; min-width: 0; }
  .person .p-name { font-weight: 550; }

  /* ---------- tables ---------- */
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: var(--muted); font-size: 12px;
       font-weight: 550; padding: 7px 10px; border-bottom: 1px solid var(--grid); }
  td { padding: 7px 10px; border-bottom: 1px solid var(--grid);
       font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: 0; }
  tr.click { cursor: pointer; }
  tr.click:hover td { background: var(--neutral-mid); }
  .up { color: var(--good-text); font-weight: 600; }
  .down { color: var(--status-crit); font-weight: 600; }
  .pill { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px;
    border-radius: 99px; font-size: 11.5px; font-weight: 650;
    font-variant-numeric: tabular-nums; white-space: nowrap; }
  .pill.up { background: #e7f3ed; color: var(--good-text); }
  .pill.down { background: #fdecec; color: #c03d3d; }
  .chip { display: inline-block; padding: 2px 9px; border-radius: 99px;
          font-size: 11px; font-weight: 650; white-space: nowrap; }
  .chip.high { background: var(--status-crit); color: #fff; }
  .chip.medium { background: var(--status-warn); color: #422e00; }
  .rank-medal { font-weight: 750; }

  /* ---------- bars ---------- */
  .bar-row { display: grid; grid-template-columns: 52px 1fr 34px; gap: 10px;
             align-items: center; padding: 4px 0; }
  .bar-row.wide { grid-template-columns: 190px 1fr 34px; }
  .bar-row .lbl { color: var(--ink-2); font-size: 12.5px; white-space: nowrap;
                  overflow: hidden; text-overflow: ellipsis; }
  .bar-row .n { text-align: right; font-variant-numeric: tabular-nums; font-size: 12.5px; }
  .bar-track { height: 9px; border-radius: 5px; background: var(--neutral-mid); }
  .bar-fill { height: 9px; border-radius: 5px; min-width: 3px; background: var(--s1); }

  /* ---------- class cards ---------- */
  .grid-classes { display: grid; grid-template-columns: repeat(auto-fill, minmax(168px,1fr)); gap: 12px; }
  .cls {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 15px; cursor: pointer; box-shadow: var(--shadow);
    transition: transform .12s ease, border-color .12s ease;
  }
  .cls:hover { border-color: var(--s1); transform: translateY(-2px); }
  .cls .t { font-size: 19px; font-weight: 750; letter-spacing: -.2px; }
  .cls .m { color: var(--ink-2); font-size: 12px; margin-top: 3px; }
  .cls .m.warn { color: var(--status-crit); font-weight: 550; }

  /* ---------- controls ---------- */
  .search { display: flex; gap: 8px; margin-bottom: 14px; }
  .search input {
    flex: 1; max-width: 420px; padding: 10px 13px; border-radius: 11px;
    border: 1px solid var(--border); background: var(--surface); color: var(--ink);
    font: inherit;
  }
  .search input:focus { outline: none; border-color: var(--s1); }
  .btn {
    padding: 8px 15px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface); color: var(--ink); font: inherit; font-weight: 550;
    cursor: pointer;
  }
  .btn:hover { border-color: var(--axis); }
  .btn.primary { background: var(--s1); border-color: var(--s1); color: #fff; }
  .btn.primary:hover { filter: brightness(1.07); }
  .btn.small { padding: 4px 10px; font-size: 12px; border-radius: 8px; }
  a.plain { color: var(--s1); text-decoration: none; }
  a.plain:hover { text-decoration: underline; }
  .back { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 14px;
          font-size: 12.5px; font-weight: 550; }
  .badges span { margin-right: 4px; }

  /* ---------- sparklines ---------- */
  .spark-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(245px,1fr)); gap: 12px; }
  .spark-card { background: var(--surface); border: 1px solid var(--border);
                border-radius: var(--radius); padding: 12px 13px; box-shadow: var(--shadow); }
  .spark-card .t { font-size: 12.5px; color: var(--ink-2); }
  .spark-card .hy { color: var(--muted); }
  .spark-card .last { font-weight: 750; font-size: 16px; }
  .spark-card.flagged { border-color: color-mix(in srgb, var(--status-crit) 55%, transparent); }
  .spark-card.flagged .last { color: var(--status-crit); }
  svg text { font: 11px Inter, "Segoe UI", system-ui, sans-serif; fill: var(--muted); }

  /* ---------- misc ---------- */
  #tip {
    position: fixed; pointer-events: none; display: none; z-index: 50;
    background: var(--ink); color: var(--page); padding: 6px 10px;
    border-radius: 9px; font-size: 12px; max-width: 260px; box-shadow: var(--shadow-lg);
  }
  .muted { color: var(--muted); }
  .flag-reason { color: var(--ink-2); font-size: 12px; }
  .prose { max-width: 720px; }
  .prose p, .prose li { color: var(--ink-2); font-size: 13.5px; }
  .prose strong { color: var(--ink); }
  .loading { color: var(--muted); padding: 30px 0; }
  .va-cell { display: flex; align-items: center; gap: 6px; }
  .va-axis { position: relative; width: 140px; height: 9px; }
  .va-axis .mid { position: absolute; left: 50%; top: -2px; bottom: -2px;
                  width: 1px; background: var(--axis); }
  .va-axis .f { position: absolute; top: 0; height: 9px; border-radius: 5px; }

  /* ---------- skeleton loading ---------- */
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  .skel { border-radius: var(--radius); animation: shimmer 1.3s linear infinite;
    background: linear-gradient(90deg, var(--neutral-mid) 25%, var(--surface) 50%, var(--neutral-mid) 75%);
    background-size: 200% 100%; }
  .skel-tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(182px,1fr));
                gap: 12px; margin-bottom: 24px; }

  /* ---------- login ---------- */
  .login-page { min-height: 100vh; display: grid; place-items: center; padding: 24px;
    background: radial-gradient(1200px 600px at 20% -10%, var(--accent-soft), transparent 60%), var(--page); }
  .login-card { width: 350px; background: var(--surface); border: 1px solid var(--border);
                border-radius: 18px; padding: 30px 28px; box-shadow: var(--shadow-lg); }
  .login-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .login-brand .mark { width: 44px; height: 44px; border-radius: 13px;
    background: linear-gradient(135deg, var(--s1), var(--s7)); color: #fff;
    font-size: 23px; font-weight: 800; display: grid; place-items: center; }
  .login-brand .b-name { font-size: 19px; font-weight: 750; }
  .login-brand small { display: block; color: var(--muted); font-size: 11.5px; font-weight: 400; }
  .login-card label { display: block; color: var(--muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: .5px; font-weight: 650; margin: 0 0 5px 2px; }
  .login-card input { width: 100%; margin-bottom: 13px; padding: 10px 13px;
    border-radius: 11px; border: 1px solid var(--border); background: var(--page);
    color: var(--ink); font: inherit; }
  .login-card input:focus { outline: none; border-color: var(--s1); }
  .login-card .err { color: var(--status-crit); font-size: 12.5px; min-height: 18px;
                     margin: 0 0 8px; }

  /* ---------- exams ---------- */
  .exam-list { display: flex; flex-direction: column; gap: 10px; }
  .exam-row {
    display: flex; align-items: center; gap: 14px; padding: 13px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); cursor: pointer;
    transition: border-color .12s ease;
  }
  .exam-row:hover { border-color: var(--s1); }
  .exam-row .e-ic { width: 40px; height: 40px; border-radius: 12px; flex: none;
    background: var(--accent-soft); color: var(--s1); display: grid; place-items: center; }
  .exam-row .e-main { flex: 1; min-width: 0; }
  .exam-row .e-title { font-weight: 650; font-size: 14px; }
  .exam-row .e-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .exam-row .e-side { text-align: right; flex: none; display: flex;
    flex-direction: column; align-items: flex-end; gap: 4px; }
  .status-pill { display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 650; }
  .status-pill svg { width: 13px; height: 13px; }
  .st-draft   { background: var(--neutral-mid); color: var(--ink-2); }
  .st-pending { background: color-mix(in srgb, var(--status-warn) 22%, transparent); color: #7a5200; }
  .st-approved{ background: color-mix(in srgb, var(--s1) 16%, transparent); color: var(--s1); }
  .st-open    { background: color-mix(in srgb, var(--status-good) 20%, transparent); color: var(--good-text); }
  .st-closed  { background: var(--neutral-mid); color: var(--muted); }
  .st-rejected{ background: color-mix(in srgb, var(--status-crit) 18%, transparent); color: var(--status-crit); }
  .score-badge { font-size: 20px; font-weight: 750; letter-spacing: -.3px; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0; }

  /* exam builder */
  .field { margin-bottom: 14px; }
  .field label { display: block; color: var(--muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: .5px; font-weight: 650; margin: 0 0 5px 2px; }
  .field input, .field select { width: 100%; max-width: 460px; padding: 9px 12px;
    border-radius: 10px; border: 1px solid var(--border); background: var(--page);
    color: var(--ink); font: inherit; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--s1); }
  .field.row { display: flex; gap: 12px; flex-wrap: wrap; }
  .field.row > div { flex: 1; min-width: 180px; }
  .qbuilder { background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .qbuilder .qb-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .qbuilder .qb-num { font-weight: 650; font-size: 13px; }
  .qbuilder .qb-prompt { width: 100%; padding: 9px 12px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--page); color: var(--ink);
    font: inherit; margin-bottom: 10px; }
  .qb-opt { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
  .qb-opt input[type=text] { flex: 1; padding: 8px 11px; border-radius: 9px;
    border: 1px solid var(--border); background: var(--page); color: var(--ink); font: inherit; }
  .qb-opt label { display: inline-flex; align-items: center; gap: 5px; color: var(--muted);
    font-size: 11.5px; white-space: nowrap; cursor: pointer; }

  /* exam taking */
  .take-q { background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 15px 17px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .take-q .tq-prompt { font-weight: 600; font-size: 14px; margin-bottom: 12px; }
  .take-q .tq-prompt .num { color: var(--muted); font-weight: 650; margin-right: 7px; }
  .opt {
    display: flex; align-items: center; gap: 11px; padding: 10px 13px; margin-bottom: 8px;
    border: 1px solid var(--border); border-radius: 11px; cursor: pointer;
    transition: border-color .1s ease, background .1s ease;
  }
  .opt:hover { border-color: var(--axis); }
  .opt.sel { border-color: var(--s1); background: var(--accent-soft); }
  .opt .dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--axis); flex: none; }
  .opt.sel .dot { border-color: var(--s1); background: var(--s1);
    box-shadow: inset 0 0 0 3px var(--surface); }
  .opt.correct { border-color: var(--status-good); background: color-mix(in srgb, var(--status-good) 12%, transparent); }
  .opt.wrong { border-color: var(--status-crit); background: color-mix(in srgb, var(--status-crit) 12%, transparent); }
  .opt .mark { margin-left: auto; font-size: 11.5px; font-weight: 650; }
  .opt .mark.ok { color: var(--good-text); } .opt .mark.no { color: var(--status-crit); }
  .diff-cell { display: inline-flex; align-items: center; gap: 8px; min-width: 120px; }
  .diff-track { width: 60px; height: 7px; border-radius: 4px; background: var(--neutral-mid); }
  .diff-fill { height: 7px; border-radius: 4px; }
  .wrong-chip { display: inline-block; background: color-mix(in srgb, var(--status-crit) 15%, transparent);
    color: var(--status-crit); font-weight: 650; font-size: 11px; padding: 1px 7px;
    border-radius: 6px; margin: 0 3px 3px 0; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="mark">Գ</div>
      <div class="b-name">Gitak<small id="tagline"></small></div>
    </div>
    <nav id="nav"></nav>
    <div class="side-foot" id="userbox"></div>
  </aside>
  <div class="shell">
    <header class="topbar">
      <button class="icon-btn menu-btn" id="menuBtn" aria-label="menu"></button>
      <div class="period" id="period"></div>
      <div class="top-actions">
        <div class="topsearch" id="topsearch"></div>
        <div class="lang" id="lang">
          <button data-l="en">EN</button><button data-l="hy">ՀԱՅ</button>

function t(key, ...args) {
  const v = (T[lang] && T[lang][key]) ?? T.en[key] ?? key;
  return typeof v === 'function' ? v(...args) : v;
}
const pl = (y, q) => t('score', y, q);
const HY_LETTERS = { A: 'Ա', B: 'Բ', C: 'Գ', D: 'Դ', E: 'Ե', F: 'Զ' };
const clsName = (label) => {
  if (label === 'graduated') return t('graduated');
  return lang === 'hy' ? String(label).replace(/[A-F]$/, m => HY_LETTERS[m]) : label;
};
const subjText = (en, hy) => lang === 'hy' ? `${hy} · ${en}` : `${en} · ${hy}`;
const subjHtml = (en, hy) => lang === 'hy'
  ? `${esc(hy)} <span class="muted">· ${esc(en)}</span>`
  : `${esc(en)} <span class="muted">· ${esc(hy)}</span>`;

const REASON_HY = [
  [/forecast (\d+(?:\.\d+)?) next quarter/, 'կանխատեսում՝ $1 հաջորդ քառորդում'],
  [/declining for several quarters/, 'նվազում է մի քանի քառորդ շարունակ'],
  [/well below class average/, 'դասարանի միջինից զգալի ցածր'],
  [/already at (\d+(?:\.\d+)?)/, 'արդեն $1 է'],
  [/frequent absences \((\d+)% of lessons missed\)/, 'հաճախակի բացակայություններ (դասերի $1%-ը բաց թողնված)'],
  [/subject-specific dip, otherwise solid/, 'անկում միայն այս առարկայում, մնացածը կայուն է'],
  [/quarter average (\d+(?:\.\d+)?) is below (\d+)/, 'քառորդի միջինը ($1) ցածր է $2-ից'],
];
function reasonText(r) {
  if (lang !== 'hy' || !r) return r;
  let out = r;
  for (const [re, sub] of REASON_HY) out = out.replace(re, sub);
  return out;
}

};

const AV_COLORS = ['--s1','--s2','--s3','--s4','--s5','--s6','--s7','--s8'];
function avatar(name, lg=false) {
  let h = 0;
  for (const ch of String(name)) h = (h * 31 + ch.codePointAt(0)) >>> 0;
  const c = `var(${AV_COLORS[h % 8]})`;
  const initials = String(name).split(/\s+/).slice(0, 2).map(w => w[0] || '').join('').toUpperCase();
  return `<span class="avatar${lg ? ' lg' : ''}" style="background:color-mix(in srgb, ${c} 16%, transparent); color:${c}">${esc(initials)}</span>`;
}

}

function sparkline(points, w=220, h=44, flagged=false) {
  if (!points.length) return '';
  const x = i => 4 + i * (w - 30) / Math.max(points.length - 1, 1);
  const y = v => h - 6 - (v - 1) * (h - 12) / 9;   /* fixed 1..10 scale */
  const path = points.map((p, i) => `${i ? 'L' : 'M'}${x(i).toFixed(1)},${y(p.avg).toFixed(1)}`).join('');
  const last = points[points.length - 1];
  const dots = points.map((p, i) =>
    `<circle cx="${x(i).toFixed(1)}" cy="${y(p.avg).toFixed(1)}" r="8" fill="transparent"
      data-tip="${esc(pl(p.y, p.q))}: ${p.avg.toFixed(1)}"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" class="spark">
    <line x1="4" y1="${y(6).toFixed(1)}" x2="${w-26}" y2="${y(6).toFixed(1)}"
      stroke="var(--grid)" stroke-dasharray="3 3"/>
    <path d="${path}" fill="none" stroke="${flagged ? 'var(--status-crit)' : 'var(--s1)'}"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${x(points.length-1).toFixed(1)}" cy="${y(last.avg).toFixed(1)}" r="3"
      fill="${flagged ? 'var(--status-crit)' : 'var(--s1)'}"/>
    ${dots}</svg>`;
}

function scoreChart(scores) {
  if (!scores.length) return '';
  const w = 760, h = 170, padL = 40, padR = 16, padT = 12, padB = 26;
  const x = i => padL + i * (w - padL - padR) / Math.max(scores.length - 1, 1);
  const y = v => padT + (1000 - v) * (h - padT - padB) / 1000;
  const path = scores.map((s, i) => `${i ? 'L' : 'M'}${x(i).toFixed(1)},${y(s.score).toFixed(1)}`).join('');
  const gridlines = [250, 500, 750, 1000].map(v =>
    `<line x1="${padL}" y1="${y(v)}" x2="${w-padR}" y2="${y(v)}" stroke="var(--grid)"/>
     <text x="${padL-6}" y="${y(v)+4}" text-anchor="end">${v}</text>`).join('');
  const ticks = scores.map((s, i) => s.q === 1 ?
    `<text x="${x(i)}" y="${h-8}" text-anchor="middle">${s.y}-${String(s.y+1).slice(2)}</text>` : '').join('');
  const dots = scores.map((s, i) =>
    `<circle cx="${x(i).toFixed(1)}" cy="${y(s.score).toFixed(1)}" r="9" fill="transparent"
       data-tip="${esc(t('scoreTip', pl(s.y, s.q), s.score, fmt(s.quarter_avg), s.rank_class))}"/>
     <circle cx="${x(i).toFixed(1)}" cy="${y(s.score).toFixed(1)}" r="3" fill="var(--s1)" pointer-events="none"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%">
    ${gridlines}
    <line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="var(--axis)"/>
    ${ticks}
    <path d="${path}" fill="none" stroke="var(--s1)" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}</svg>`;
}

function attendanceChart(points) {
  if (!points.length) return '';
  const w = 760, h = 130, padL = 40, padR = 16, padT = 12, padB = 26;
  const rated = points.filter(p => p.rate != null);
  if (!rated.length) return '';
  const x = i => padL + i * (w - padL - padR) / Math.max(points.length - 1, 1);
  const lo = 80;   /* show the 80-100% band where variation lives */
  const y = v => padT + (100 - Math.max(v, lo)) * (h - padT - padB) / (100 - lo);
  const path = points.map((p, i) => p.rate == null ? '' :
    `${i && points[i-1].rate != null ? 'L' : 'M'}${x(i).toFixed(1)},${y(p.rate).toFixed(1)}`).join('');
  const gridlines = [80, 90, 100].map(v =>
    `<line x1="${padL}" y1="${y(v)}" x2="${w-padR}" y2="${y(v)}" stroke="var(--grid)"/>
     <text x="${padL-6}" y="${y(v)+4}" text-anchor="end">${v}%</text>`).join('');
  const ticks = points.map((p, i) => p.q === 1 ?
    `<text x="${x(i)}" y="${h-8}" text-anchor="middle">${p.y}-${String(p.y+1).slice(2)}</text>` : '').join('');
  const dots = points.map((p, i) => p.rate == null ? '' :
    `<circle cx="${x(i).toFixed(1)}" cy="${y(p.rate).toFixed(1)}" r="9" fill="transparent"
       data-tip="${esc(pl(p.y, p.q))} — ${p.rate}% · ${esc(t('absentLessons', p.absent))}"/>
     <circle cx="${x(i).toFixed(1)}" cy="${y(p.rate).toFixed(1)}" r="3"
       fill="${p.rate < 90 ? 'var(--status-crit)' : 'var(--s1)'}" pointer-events="none"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%">
    ${gridlines}
    <line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="var(--axis)"/>
    ${ticks}
    <path d="${path}" fill="none" stroke="var(--s1)" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}</svg>`;
}

function bars(rows, max, wide=false) {
  return rows.map(r => `
    <div class="bar-row${wide ? ' wide' : ''}"><div class="lbl" title="${esc(r.label)}">${esc(r.label)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(2, 100*r.value/max)}%"></div></div>
      <div class="n">${r.value}</div></div>`).join('');
}

const ST_ICON = { pending: 'clock', approved: 'calendar', open: 'check',
                  closed: 'lock', rejected: 'x', draft: 'exam' };
function statusPill(status) {
  const label = (T[lang].examStatus || T.en.examStatus)[status] || status;
  return `<span class="status-pill st-${status}">${icon(ST_ICON[status] || 'exam')}${esc(label)}</span>`;
}
function examRow(q) {
  const sub = q.my_submission;
  let side;
  if (sub) side = `<span class="score-badge">${fmt(sub.score, 1)}</span>
    <span class="muted" style="font-size:11px">${t('examCorrect', sub.n_correct, sub.n_total)}</span>`;
  else side = statusPill(q.status);
  const meta = [subjText(q.subject, q.subject_hy), t('classWord') + ' ' + clsName(q.class),
    q.scheduled_for ? '📅 ' + q.scheduled_for : null,
    q.n_questions ? t('colQuestions') + ': ' + q.n_questions : null].filter(Boolean).join(' · ');
  return `<div class="exam-row" data-go="#exam/${q.id}">
    <div class="e-ic">${icon('exam')}</div>
    <div class="e-main"><div class="e-title">${esc(q.title)}</div>
      <div class="e-sub">${esc(meta)}</div></div>
    <div class="e-side">${side}</div></div>`;
}
function examSection(title, list) {
  if (!list.length) return '';
  return `<h2>${esc(title)} <span class="muted" style="font-weight:400">· ${list.length}</span></h2>
    <div class="exam-list">${list.map(examRow).join('')}</div>`;
}

    html += examSection(t('examOpenNow'), open)

          + examSection(t('examPast'), past);

async function vExam(id) {
  const q = await api('/quizzes/' + id);
  const canManage = q.is_manager;
  let html = `<a class="plain back" href="#exams">${t('back')}</a>
    <div class="page-head"><div class="e-ic" style="width:44px;height:44px;border-radius:13px">${icon('exam')}</div>
    <div><h2>${esc(q.title)}</h2>
    <div class="ph-sub">${subjText(q.subject, q.subject_hy)} · ${t('classWord')} ${esc(clsName(q.class))}
    ${q.scheduled_for ? '· 📅 ' + esc(q.scheduled_for) : ''}</div></div>
    <div style="margin-left:auto">${statusPill(q.status)}</div></div>`;

  if (q.status === 'rejected' && q.review_note)
    html += `<div class="card" style="border-color:var(--status-crit);margin-bottom:14px">
      ${esc(t('examRejectedNote', q.review_note))}</div>`;

  // manager lifecycle actions
  if (canManage) {
    const acts = [];
    if (q.status === 'draft') acts.push(['submit', t('examSubmitForApproval'), 'primary']);
    if (q.status === 'pending') { acts.push(['approve', t('examApprove'), 'primary']);
                                  acts.push(['reject', t('examReject'), '']); }
    if (q.status === 'approved') acts.push(['open', t('examOpen'), 'primary']);
    if (q.status === 'open') acts.push(['close', t('examClose'), '']);
    if (acts.length) html += `<div class="actions">` + acts.map(([a, label, cls]) =>
      `<button class="btn ${cls}" data-act="${a}">${esc(label)}</button>`).join('') + `</div>`;
  }

  // student taking / result
  const sub = q.my_submission;
  if (!canManage && q.questions === null) {
    html += `<div class="card"><div class="person">${icon('lock')}
      <span>${t('examQuestionsHidden')}</span></div>
      <div class="note">${q.n_questions} ${t('colQuestions').toLowerCase()}</div></div>`;
  } else if (!canManage && q.can_take && !sub) {
    html += `<form id="takeForm">` + q.questions.map(qq => `
      <div class="take-q" data-qid="${qq.id}">
        <div class="tq-prompt"><span class="num">${qq.position + 1}.</span>${esc(qq.prompt)}</div>
        ${qq.options.map((o, i) => `
          <label class="opt" data-oi="${i}">
            <span class="dot"></span><span>${esc(o)}</span>
            <input type="radio" name="q${qq.id}" value="${i}" style="display:none"></label>`).join('')}
      </div>`).join('') +
      `<div class="actions"><button type="button" class="btn primary" id="submitExam">${t('examSubmit')}</button></div></form>`;
  }

  // result review (student who submitted, or closed)
  if (sub) {
    html += `<div class="card" style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:16px">
      <div><div class="l muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px">${t('examYourScore')}</div>
      <div class="score-badge" style="font-size:30px">${fmt(sub.score, 1)}</div></div>
      <div class="muted">${t('examCorrect', sub.n_correct, sub.n_total)}</div></div></div>`;
  }
  if (!canManage && sub && q.questions) {
    html += `<h2>${t('examReview')}</h2>` + q.questions.map(qq => `
      <div class="take-q">
        <div class="tq-prompt"><span class="num">${qq.position + 1}.</span>${esc(qq.prompt)}</div>
        ${qq.options.map((o, i) => {
          const isCorrect = i === qq.correct, isChosen = i === qq.chosen;
          let cls = '', mark = '';
          if (isCorrect) { cls = 'correct'; mark = `<span class="mark ok">✓ ${t('examCorrectAnswer')}</span>`; }
          else if (isChosen) { cls = 'wrong'; mark = `<span class="mark no">✗ ${t('examYourAnswer')}</span>`; }
          return `<div class="opt ${cls}"><span>${esc(o)}</span>${mark}</div>`;
        }).join('')}
      </div>`).join('');
  }

  // manager: author preview + item analysis
  if (canManage && q.questions) {
    if (q.analysis) html += renderAnalysis(q.analysis);
    html += `<h2>${t('colQuestions')}</h2>` + q.questions.map(qq => `
      <div class="take-q"><div class="tq-prompt"><span class="num">${qq.position + 1}.</span>${esc(qq.prompt)}</div>
      ${qq.options.map((o, i) => `<div class="opt ${i === qq.correct ? 'correct' : ''}">
        <span>${esc(o)}</span>${i === qq.correct ? `<span class="mark ok">✓</span>` : ''}</div>`).join('')}
      </div>`).join('');
  }

  view.innerHTML = html;

  view.querySelectorAll('[data-act]').forEach(b => b.onclick = async () => {
    let note = null;
    if (b.dataset.act === 'reject') { note = prompt(t('examRejectPrompt')) ?? ''; }
    await fetch(`/api/quizzes/${id}/transition`, { method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: b.dataset.act, note }) });
    route();
  });
  view.querySelectorAll('.take-q .opt').forEach(opt => opt.onclick = () => {
    const box = opt.closest('.take-q');
    box.querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
    opt.classList.add('sel');
    const radio = opt.querySelector('input'); if (radio) radio.checked = true;
  });
  const sb = document.getElementById('submitExam');
  if (sb) sb.onclick = async () => {
    if (!confirm(t('examSubmitConfirm'))) return;
    const answers = {};
    view.querySelectorAll('.take-q').forEach(box => {
      const checked = box.querySelector('input:checked');
      if (checked) answers[box.dataset.qid] = +checked.value;
    });
    const r = await fetch(`/api/quizzes/${id}/submit`, { method: 'POST',
      headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ answers }) });
    if (r.ok) route(); else alert((await r.json()).detail || 'error');
  };
}

function renderAnalysis(a) {
  const diff = (pct) => {
    if (pct == null) return '<span class="muted">–</span>';
    const c = pct >= 70 ? 'var(--status-good)' : pct >= 40 ? 'var(--status-warn)' : 'var(--status-crit)';
    return `<span class="diff-cell"><span class="diff-track"><span class="diff-fill"
      style="width:${pct}%;background:${c}"></span></span>${pct}%</span>`;
  };
  return `<div class="tiles" style="margin-bottom:16px">
    ${tile('student', t('colSubmitted'), `${a.n_submitted}/${a.n_students}`, '')}
    ${tile('trend', t('colScore'), a.avg_score != null ? fmt(a.avg_score, 1) : '–', t('examClassResults'))}
  </div>
  <h2>${t('examItemAnalysis')}</h2>
  <div class="card"><table><tr><th>#</th><th>${t('examBuilderPrompt')}</th><th>${t('colDifficulty')}</th></tr>
    ${a.questions.map(q => `<tr><td>${q.position}</td><td>${esc(q.prompt)}</td>
      <td>${diff(q.pct_correct)}</td></tr>`).join('')}</table></div>
  <h2>${t('examClassResults')}</h2>
  <div class="card"><table><tr><th>${t('thStudent')}</th><th>${t('colScore')}</th><th>${t('colWrong')}</th></tr>
    ${a.students.map(s => `<tr class="click" data-go="#student/${s.student_id}">
      <td>${person(s.name)}</td>
      <td>${s.submitted ? `<b>${fmt(s.score, 1)}</b>` : `<span class="muted">${t('examNotSubmitted')}</span>`}</td>
      <td>${s.wrong_questions.map(n => `<span class="wrong-chip">${n}</span>`).join('') ||
        (s.submitted ? '<span class="up">✓</span>' : '')}</td></tr>`).join('')}</table></div>`;
}

      <button type="button" class="btn small" data-remove>${t('examBuilderRemoveQ')}</button></div>
    <input class="qb-prompt" data-prompt placeholder="${esc(t('examBuilderPrompt'))}">
    ${[0,1,2,3].map(i => `<div class="qb-opt">
      <input type="text" data-opt placeholder="${esc(t('examBuilderOption', i + 1))}">
      <label><input type="radio" name="c${n}" data-correct value="${i}">${t('examBuilderCorrect')}</label>
    </div>`).join('')}</div>`;
  view.innerHTML = `<a class="plain back" href="#exams">${t('back')}</a>
    <div class="page-head"><div><h2>${t('examCreate')}</h2></div></div>
    <div class="card" style="margin-bottom:16px">
      <div class="field"><label>${t('examBuilderTitle')}</label>
        <input id="exTitle" placeholder="${esc(t('examTitleHint'))}"></div>
      <div class="field row">
        <div><label>${t('examBuilderSubject')}</label><select id="exSubject">
          ${opts.subjects.map(s => `<option value="${s.id}">${esc(subjText(s.name_en, s.name_hy))}</option>`).join('')}
        </select></div>
        <div><label>${t('examBuilderClass')}</label><select id="exClass">
          ${opts.classes.map(c => `<option value="${c.id}">${esc(clsName(c.label))}</option>`).join('')}
        </select></div>
        <div><label>${t('examBuilderDate')}</label><input type="date" id="exDate"></div>
      </div>
    </div>
    <div id="qList"></div>
    <div class="actions">
      <button class="btn" id="addQ">${icon('plus')} ${t('examBuilderAddQ')}</button>
      <button class="btn primary" id="saveExam">${t('examSaveDraft')}</button></div>
    <div class="err" id="exErr" style="color:var(--status-crit);font-size:12.5px"></div>`;

  const qList = document.getElementById('qList');
  const addQ = () => { qCount++; qList.insertAdjacentHTML('beforeend', qBlock(qCount));
    qList.lastElementChild.querySelector('[data-remove]').onclick = (e) => e.target.closest('[data-q]').remove(); };
  for (let i = 0; i < 5; i++) addQ();
  document.getElementById('addQ').onclick = (e) => { e.preventDefault(); addQ(); };

  document.getElementById('saveExam').onclick = async () => {
    const questions = [];
    qList.querySelectorAll('[data-q]').forEach(block => {
      const prompt = block.querySelector('[data-prompt]').value.trim();
      const opts2 = [...block.querySelectorAll('[data-opt]')].map(i => i.value.trim());
      const checked = block.querySelector('[data-correct]:checked');
      if (!prompt) return;
      const kept = []; let correct = -1;
      opts2.forEach((o, i) => { if (o) { if (checked && +checked.value === i) correct = kept.length; kept.push(o); } });
      if (kept.length >= 2 && correct >= 0) questions.push({ prompt, options: kept, correct });
    });
    const title = document.getElementById('exTitle').value.trim();
    const class_id = +document.getElementById('exClass').value;
    if (!title || !class_id || !questions.length) {
      document.getElementById('exErr').textContent = t('examBuilderNeed'); return;
    }
    const r = await fetch('/api/quizzes', { method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, subject_id: +document.getElementById('exSubject').value,
        class_id, scheduled_for: document.getElementById('exDate').value || null, questions }) });
    if (r.ok) { const { id } = await r.json();
      // auto-send for approval so the workflow is visible end to end
      await fetch(`/api/quizzes/${id}/transition`, { method: 'POST',
        headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'submit' }) });
      location.hash = '#exam/' + id;
    } else { document.getElementById('exErr').textContent = (await r.json()).detail || 'error'; }
  };
}

/* ---------------- chrome + router ---------------- */
let ME = null;   // null = sign-in needed; {open:true} = no accounts, demo mode
const restrictedRole = () => ME && !ME.open && (ME.role === 'student' || ME.role === 'parent');

const navItem = (href, ic, label) =>
  `<a href="${href}">${icon(ic)}<span>${esc(label)}</span></a>`;

function navHtml() {
  if (!ME) return '';
  if (restrictedRole()) {
    const kids = ME.students || [];
    let items = '';
    if (ME.role === 'student' && kids.length === 1) {
      items += navItem(`#student/${kids[0].id}`, 'student', t('navMyPage'));
      if (kids[0].class_id) items += navItem(`#class/${kids[0].class_id}`, 'home', t('navMyClass'));
    } else {
      items += kids.map(k =>
        navItem(`#student/${k.id}`, 'student', k.name) +
        navItem(`#class/${k.class_id}`, 'home', clsName(k.class))).join('');
    }
    return items + navItem('#exams', 'exam', t('navExams'))
                 + navItem('#about', 'about', t('navAbout'));
  }
  return navItem('#overview', 'overview', t('navOverview'))
       + `<div class="nav-sec">${t('navSecSchool')}</div>`
       + navItem('#classes', 'classes', t('navClasses'))
       + navItem('#students', 'student', t('navStudents'))
       + navItem('#teachers', 'teachers', t('navTeachers'))
       + navItem('#exams', 'exam', t('navExams'))
       + `<div class="nav-sec">${t('navSecOther')}</div>`
       + navItem('#about', 'about', t('navAbout'));
}

function renderChrome() {
  document.documentElement.lang = lang;
  document.body.classList.toggle('authed', !!ME);
  document.getElementById('tagline').textContent = t('tagline');
  document.getElementById('nav').innerHTML = navHtml();
  document.getElementById('menuBtn').innerHTML = icon('menu');
  document.querySelectorAll('#lang button').forEach(b =>
    b.classList.toggle('on', b.dataset.l === lang));

  const box = document.getElementById('userbox');
  if (ME && !ME.open) {
    const roleName = (T[lang].roles || T.en.roles)[ME.role] || ME.role;
    box.innerHTML = `<div class="user-card">${avatar(ME.name)}
      <div class="u-meta"><div class="u-name">${esc(ME.name)}</div>
      <div class="u-role">${esc(roleName)}</div></div>
      <button class="icon-btn" id="logout" title="${esc(t('logout'))}">${icon('logout')}</button></div>`;
    document.getElementById('logout').onclick = async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      ME = null; renderChrome(); renderLogin();
    };
  } else {
    box.innerHTML = '';
  }

  const ts = document.getElementById('topsearch');
  const canSearch = ME && (ME.open || ME.role === 'director' || ME.role === 'teacher');
  if (canSearch) {
    ts.innerHTML = `<div class="ts-wrap">${icon('search')}
      <input id="ts-q" placeholder="${esc(t('searchPlaceholder'))}"></div>
      <div class="ts-drop" id="ts-drop" style="display:none"></div>`;
    const input = document.getElementById('ts-q');
    const drop = document.getElementById('ts-drop');
    let tsTimer;
    input.oninput = () => {
      clearTimeout(tsTimer);
      tsTimer = setTimeout(async () => {
        const q = input.value.trim();
        if (q.length < 2) { drop.style.display = 'none'; return; }
        const r = await api('/search?q=' + encodeURIComponent(q));
        drop.innerHTML = r.results.length
          ? r.results.map(s => `<div class="ts-item" data-go="#student/${s.id}">
              ${avatar(s.name)}<span>${esc(s.name)}
              <span class="muted">· ${esc(clsName(s.class))}</span></span></div>`).join('')
          : `<div class="ts-empty">${t('searchNone')}</div>`;
        drop.style.display = 'block';
      }, 180);
    };
    input.addEventListener('keydown', e => { if (e.key === 'Escape') drop.style.display = 'none'; });
    document.addEventListener('click', e => {
      if (!ts.contains(e.target)) drop.style.display = 'none';
    });
  } else {
    ts.innerHTML = '';
  }
}

/* mobile sidebar */
const sidebarEl = document.getElementById('sidebar');
const backdropEl = document.getElementById('backdrop');
function closeSidebar() { sidebarEl.classList.remove('open'); backdropEl.classList.remove('show'); }
document.getElementById('menuBtn').onclick = () => {
  sidebarEl.classList.add('open'); backdropEl.classList.add('show');
};
backdropEl.onclick = closeSidebar;
document.getElementById('nav').addEventListener('click', closeSidebar);

function renderLogin() {
  document.body.classList.remove('authed');
  view.innerHTML = `<div class="login-page"><div class="login-card">
    <div class="login-brand"><div class="mark">Գ</div>
      <div><div class="b-name">Gitak</div><small>${esc(t('tagline'))}</small></div></div>
    <label for="lg-u">${esc(t('username'))}</label>
    <input id="lg-u" autocomplete="username" autofocus>
    <label for="lg-p">${esc(t('password'))}</label>
    <input id="lg-p" type="password" autocomplete="current-password">
    <div class="err" id="lg-err"></div>
    <button class="btn primary" id="lg-go" style="width:100%">${t('signIn')}</button>
  </div></div>`;
  const go = async () => {
    const r = await fetch('/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: document.getElementById('lg-u').value,
                             password: document.getElementById('lg-p').value })
    });
    if (!r.ok) { document.getElementById('lg-err').textContent = t('loginError'); return; }
    ME = await r.json();
    renderChrome();
    defaultRoute();
  };
  document.getElementById('lg-go').onclick = go;
  view.querySelectorAll('input').forEach(i =>
    i.addEventListener('keydown', e => { if (e.key === 'Enter') go(); }));
}

function defaultRoute() {
  if (restrictedRole() && ME.students && ME.students.length) {
    const target = '#student/' + ME.students[0].id;
    if (location.hash === target) route(); else location.hash = target;
  } else if (location.hash) {
    route();
  } else {
    location.hash = '#overview';
  }
}

async function route() {
  if (!ME) { renderLogin(); return; }
  let h = location.hash || '#overview';
  if (restrictedRole() && (h === '#overview' || h === '#students' || h === '#teachers')) {
    defaultRoute(); return;
  }
  if (h === '#exam-new' && !(ME.open || ME.role === 'director' || ME.role === 'teacher')) {
    location.hash = '#exams'; return;
  }
  document.querySelectorAll('#nav a').forEach(a =>
    a.classList.toggle('on',
      a.getAttribute('href') === h ||
      (a.getAttribute('href') === '#classes' && h.startsWith('#class/')) ||
      (a.getAttribute('href') === '#students' && h.startsWith('#student/')) ||
      (a.getAttribute('href') === '#exams' && (h.startsWith('#exam/') || h === '#exam-new')) ||
      (a.getAttribute('href') === '#overview' && (h === '' || h === '#overview'))));
  const drop = document.getElementById('ts-drop');
  if (drop) drop.style.display = 'none';
  view.innerHTML = skeleton();
  try {
    if (h.startsWith('#class/')) await vClass(h.split('/')[1]);
    else if (h.startsWith('#student/')) await vStudent(h.split('/')[1]);
    else if (h.startsWith('#exam/')) await vExam(h.split('/')[1]);
    else if (h === '#exam-new') await vExamNew();
    else if (h === '#exams') await vExams();
    else if (h === '#classes') await vClasses();
    else if (h === '#students') await vStudents();
    else if (h === '#teachers') await vTeachers();
    else if (h === '#about') vAbout();
    else await vOverview();
  } catch (e) {
    view.innerHTML = `<div class="loading">${t('loadError', esc(e.message))}</div>`;
  }
}

document.getElementById('lang').addEventListener('click', (e) => {
  const b = e.target.closest('button[data-l]');
  if (!b || b.dataset.l === lang) return;
  lang = b.dataset.l;
  localStorage.setItem('gitak-lang', lang);
  renderChrome();
  route();
});

addEventListener('hashchange', () => { if (ME) route(); });
(async function boot() {
  let r = null;
  try { r = await fetch('/api/auth/me'); } catch (e) {}
  ME = r && r.ok ? await r.json() : null;
  renderChrome();
  if (!ME) renderLogin(); else defaultRoute();
})();
document.addEventListener('click', (e) => {
  const row = e.target.closest('[data-go]');
  if (row) location.hash = row.dataset.go;
});
document.addEventListener('mousemove', (e) => {
  const el = e.target.closest && e.target.closest('[data-tip]');
  if (el) showTip(esc(el.dataset.tip), e); else hideTip();
});
</script>
