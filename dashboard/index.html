<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gitak · Գիտակ</title>
<style>
  :root {
    color-scheme: light;
    --page: #f9f9f7; --surface: #fcfcfb;
    --ink: #0b0b0b; --ink-2: #52514e; --muted: #898781;
    --grid: #e1e0d9; --axis: #c3c2b7; --border: rgba(11,11,11,.10);
    --s1: #2a78d6; --s1-soft: #9ec5f4; --s1-softer: #cde2fb;
    --good-text: #006300; --status-good: #0ca30c; --status-warn: #fab219;
    --status-serious: #ec835a; --status-crit: #d03b3b;
    --neutral-mid: #f0efec;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page: #0d0d0d; --surface: #1a1a19;
      --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
      --grid: #2c2c2a; --axis: #383835; --border: rgba(255,255,255,.10);
      --s1: #3987e5; --s1-soft: #1c5cab; --s1-softer: #184f95;
      --good-text: #0ca30c; --neutral-mid: #383835;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--page); color: var(--ink);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    padding: 14px 22px; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .logo { font-size: 19px; font-weight: 700; letter-spacing: .2px; }
  .logo small { color: var(--muted); font-weight: 400; margin-left: 6px; }
  .period { color: var(--ink-2); font-size: 12.5px; }
  nav { display: flex; gap: 4px; margin-left: auto; flex-wrap: wrap; }
  nav a {
    padding: 6px 12px; border-radius: 8px; text-decoration: none;
    color: var(--ink-2); font-weight: 500;
  }
  nav a.on { background: var(--s1); color: #fff; }
  nav a:not(.on):hover { background: var(--neutral-mid); }
  .lang { display: flex; border: 1px solid var(--axis); border-radius: 8px; overflow: hidden; }
  .lang button {
    border: 0; background: var(--surface); color: var(--ink-2);
    font: inherit; font-size: 12px; font-weight: 600; padding: 5px 10px; cursor: pointer;
  }
  .lang button.on { background: var(--s1); color: #fff; }
  main { max-width: 1100px; margin: 0 auto; padding: 20px 22px 60px; }
  h2 { font-size: 17px; margin: 26px 0 10px; }
  h2:first-child { margin-top: 4px; }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 10px; }
  .tile {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px;
  }
  .tile .v { font-size: 26px; font-weight: 700; margin: 2px 0; }
  .tile .l { color: var(--muted); font-size: 11.5px; text-transform: uppercase; letter-spacing: .5px; }
  .tile .s { color: var(--ink-2); font-size: 12px; }
  .cards2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 800px) { .cards2 { grid-template-columns: 1fr; } }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
  }
  .card h3 { margin: 0 0 10px; font-size: 14px; }
  .card .note { color: var(--muted); font-size: 12px; margin-top: 8px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: var(--muted); font-size: 11.5px;
       text-transform: uppercase; letter-spacing: .4px; font-weight: 600;
       padding: 4px 8px; border-bottom: 1px solid var(--grid); }
  td { padding: 6px 8px; border-bottom: 1px solid var(--grid);
       font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: 0; }
  tr.click { cursor: pointer; }
  tr.click:hover td { background: var(--neutral-mid); }
  .up { color: var(--good-text); font-weight: 600; }
  .down { color: var(--status-crit); font-weight: 600; }
  .chip { display: inline-block; padding: 1px 8px; border-radius: 99px;
          font-size: 11.5px; font-weight: 600; }
  .chip.high { background: var(--status-crit); color: #fff; }
  .chip.medium { background: var(--status-warn); color: #422e00; }
  .bar-row { display: grid; grid-template-columns: 52px 1fr 34px; gap: 8px;
             align-items: center; padding: 3px 0; }
  .bar-row.wide { grid-template-columns: 190px 1fr 34px; }
  .bar-row .lbl { color: var(--ink-2); font-size: 12.5px; white-space: nowrap;
                  overflow: hidden; text-overflow: ellipsis; }
  .bar-row .n { text-align: right; font-variant-numeric: tabular-nums; font-size: 12.5px; }
  .bar-track { height: 10px; border-radius: 4px; background: transparent; }
  .bar-fill { height: 10px; border-radius: 4px; background: var(--s1); min-width: 2px; }
  .grid-classes { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 10px; }
  .cls {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; cursor: pointer;
  }
  .cls:hover { border-color: var(--s1); }
  .cls .t { font-size: 18px; font-weight: 700; }
  .cls .m { color: var(--ink-2); font-size: 12px; margin-top: 2px; }
  .search { display: flex; gap: 8px; margin-bottom: 14px; }
  .search input {
    flex: 1; max-width: 420px; padding: 9px 12px; border-radius: 10px;
    border: 1px solid var(--axis); background: var(--surface); color: var(--ink);
    font: inherit;
  }
  .btn {
    padding: 8px 14px; border-radius: 10px; border: 1px solid var(--axis);
    background: var(--surface); color: var(--ink); font: inherit; cursor: pointer;
  }
  .btn.primary { background: var(--s1); border-color: var(--s1); color: #fff; }
  a.plain { color: var(--s1); text-decoration: none; }
  a.plain:hover { text-decoration: underline; }
  .back { display: inline-block; margin-bottom: 12px; }
  .badges span { margin-right: 4px; }
  .spark-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 10px; }
  .spark-card { background: var(--surface); border: 1px solid var(--border);
                border-radius: 12px; padding: 10px 12px; }
  .spark-card .t { font-size: 12.5px; color: var(--ink-2); }
  .spark-card .hy { color: var(--muted); }
  .spark-card .last { font-weight: 700; font-size: 16px; }
  .spark-card.flagged { border-color: var(--status-crit); }
  svg text { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: var(--muted); }
  #tip {
    position: fixed; pointer-events: none; display: none; z-index: 10;
    background: var(--ink); color: var(--page); padding: 5px 9px;
    border-radius: 8px; font-size: 12px; max-width: 260px;
  }
  .muted { color: var(--muted); }
  .flag-reason { color: var(--ink-2); font-size: 12px; }
  .prose { max-width: 720px; }
  .prose p, .prose li { color: var(--ink-2); font-size: 13.5px; }
  .prose strong { color: var(--ink); }
  .loading { color: var(--muted); padding: 30px 0; }
  .va-cell { display: flex; align-items: center; gap: 6px; }
  .va-axis { position: relative; width: 140px; height: 10px; }
  .va-axis .mid { position: absolute; left: 50%; top: -2px; bottom: -2px;
                  width: 1px; background: var(--axis); }
  .va-axis .f { position: absolute; top: 0; height: 10px; border-radius: 4px; }
</style>
</head>

    riser: 'մեծ առաջընթաց', perfect: 'բոլոր առարկաները 9+', mentor: 'օգնել է դասընկերոջը' },
  riskHigh: '▲ բարձր ռիսկ', riskMedium: '● միջին',
  track: { STEM: 'Ճշգրիտ (STEM)', Humanities: 'Հումանիտար', Languages: 'Լեզուներ', Arts: 'Արվեստ' },
},
};

function t(key, ...args) {
  const v = (T[lang] && T[lang][key]) ?? T.en[key] ?? key;
  return typeof v === 'function' ? v(...args) : v;
}
const pl = (y, q) => t('score', y, q);
const HY_LETTERS = { A: 'Ա', B: 'Բ', C: 'Գ', D: 'Դ', E: 'Ե', F: 'Զ' };
const clsName = (label) => {
  if (label === 'graduated') return t('graduated');
  return lang === 'hy' ? String(label).replace(/[A-F]$/, m => HY_LETTERS[m]) : label;
};
const subjText = (en, hy) => lang === 'hy' ? `${hy} · ${en}` : `${en} · ${hy}`;
const subjHtml = (en, hy) => lang === 'hy'
  ? `${esc(hy)} <span class="muted">· ${esc(en)}</span>`
  : `${esc(en)} <span class="muted">· ${esc(hy)}</span>`;

const REASON_HY = [
  [/forecast (\d+(?:\.\d+)?) next quarter/, 'կանխատեսում՝ $1 հաջորդ քառորդում'],
  [/declining for several quarters/, 'նվազում է մի քանի քառորդ շարունակ'],
  [/well below class average/, 'դասարանի միջինից զգալի ցածր'],
  [/already at (\d+(?:\.\d+)?)/, 'արդեն $1 է'],
  [/subject-specific dip, otherwise solid/, 'անկում միայն այս առարկայում, մնացածը կայուն է'],
  [/quarter average (\d+(?:\.\d+)?) is below (\d+)/, 'քառորդի միջինը ($1) ցածր է $2-ից'],
];
function reasonText(r) {
  if (lang !== 'hy' || !r) return r;
  let out = r;
  for (const [re, sub] of REASON_HY) out = out.replace(re, sub);
  return out;
}

/* ---------------- shared helpers ---------------- */
const view = document.getElementById('view');
const tip = document.getElementById('tip');
const esc = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const api = async (p) => (await fetch('/api' + p)).json();
const fmt = (x, d=2) => x == null ? '–' : (+x).toFixed(d);
const deltaHtml = (d) => d == null ? '<span class="muted">–</span>'
  : d >= 0 ? `<span class="up">▲ +${(+d).toFixed(2)}</span>`
           : `<span class="down">▼ ${(+d).toFixed(2)}</span>`;
const BADGE = { gold:'🥇', silver:'🥈', bronze:'🥉', riser:'🚀', perfect:'⭐', mentor:'🤝' };
const badgeName = (code) => (T[lang].badgeNames || T.en.badgeNames)[code] || code;
const riskChip = (r) => r === 'high'
  ? `<span class="chip high">${t('riskHigh')}</span>`
  : `<span class="chip medium">${t('riskMedium')}</span>`;

function showTip(html, ev) {
  tip.innerHTML = html; tip.style.display = 'block';
  const x = Math.min(ev.clientX + 14, innerWidth - 280);
  tip.style.left = x + 'px'; tip.style.top = (ev.clientY + 14) + 'px';
}
const hideTip = () => tip.style.display = 'none';

function sparkline(points, w=220, h=44, flagged=false) {
  if (!points.length) return '';
  const x = i => 4 + i * (w - 30) / Math.max(points.length - 1, 1);
  const y = v => h - 6 - (v - 1) * (h - 12) / 9;   /* fixed 1..10 scale */
  const path = points.map((p, i) => `${i ? 'L' : 'M'}${x(i).toFixed(1)},${y(p.avg).toFixed(1)}`).join('');
  const last = points[points.length - 1];
  const dots = points.map((p, i) =>
    `<circle cx="${x(i).toFixed(1)}" cy="${y(p.avg).toFixed(1)}" r="8" fill="transparent"
      data-tip="${esc(pl(p.y, p.q))}: ${p.avg.toFixed(1)}"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" class="spark">
    <line x1="4" y1="${y(6).toFixed(1)}" x2="${w-26}" y2="${y(6).toFixed(1)}"
      stroke="var(--grid)" stroke-dasharray="3 3"/>
    <path d="${path}" fill="none" stroke="${flagged ? 'var(--status-crit)' : 'var(--s1)'}"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${x(points.length-1).toFixed(1)}" cy="${y(last.avg).toFixed(1)}" r="3"
      fill="${flagged ? 'var(--status-crit)' : 'var(--s1)'}"/>
    ${dots}</svg>`;
}

function scoreChart(scores) {
  if (!scores.length) return '';
  const w = 760, h = 170, padL = 40, padR = 16, padT = 12, padB = 26;
  const x = i => padL + i * (w - padL - padR) / Math.max(scores.length - 1, 1);
  const y = v => padT + (1000 - v) * (h - padT - padB) / 1000;
  const path = scores.map((s, i) => `${i ? 'L' : 'M'}${x(i).toFixed(1)},${y(s.score).toFixed(1)}`).join('');
  const gridlines = [250, 500, 750, 1000].map(v =>
    `<line x1="${padL}" y1="${y(v)}" x2="${w-padR}" y2="${y(v)}" stroke="var(--grid)"/>
     <text x="${padL-6}" y="${y(v)+4}" text-anchor="end">${v}</text>`).join('');
  const ticks = scores.map((s, i) => s.q === 1 ?
    `<text x="${x(i)}" y="${h-8}" text-anchor="middle">${s.y}-${String(s.y+1).slice(2)}</text>` : '').join('');
  const dots = scores.map((s, i) =>
    `<circle cx="${x(i).toFixed(1)}" cy="${y(s.score).toFixed(1)}" r="9" fill="transparent"
       data-tip="${esc(t('scoreTip', pl(s.y, s.q), s.score, fmt(s.quarter_avg), s.rank_class))}"/>
     <circle cx="${x(i).toFixed(1)}" cy="${y(s.score).toFixed(1)}" r="3" fill="var(--s1)" pointer-events="none"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%">
    ${gridlines}
    <line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="var(--axis)"/>
    ${ticks}
    <path d="${path}" fill="none" stroke="var(--s1)" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}</svg>`;
}

function bars(rows, max, wide=false) {
  return rows.map(r => `
    <div class="bar-row${wide ? ' wide' : ''}"><div class="lbl" title="${esc(r.label)}">${esc(r.label)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(2, 100*r.value/max)}%"></div></div>
      <div class="n">${r.value}</div></div>`).join('');
}

function setPeriodLine(period) {
  if (!period) return;
  document.getElementById('period').textContent = t('periodLine',
    pl(period.latest_year, period.latest_quarter),
    pl(period.target_year, period.target_quarter));
}

  ${t('downloadTranscript')}</a> <span class="muted">${t('transcriptNote')}</span></p>`;
}

async function vTeachers() {
  const d = await api('/teachers');
  const maxAbs = Math.max(...d.teachers.map(x => Math.abs(x.value_added)), 0.01);
  view.innerHTML = `<h2>${t('teacherVA')}</h2>
  <div class="card">
  <table><tr><th>${t('thTeacher')}</th><th>${t('thSubject')}</th>
  <th>${t('thValueAdded')}</th><th></th><th>${t('thStudentYears')}</th></tr>
  ${d.teachers.map(x => {
    const w = Math.abs(x.value_added) / maxAbs * 50;
    const pos = x.value_added >= 0;
    return `<tr><td>${esc(x.name)}</td>
      <td>${subjHtml(x.subject, x.subject_hy)}</td>
      <td class="${pos ? 'up' : 'down'}">${pos ? '+' : ''}${fmt(x.value_added, 2)}</td>
      <td><div class="va-axis"><div class="mid"></div>
        <div class="f" style="${pos
          ? `left:50%;width:${w}%;background:var(--s1)`
          : `right:50%;width:${w}%;background:var(--status-crit)`}"></div></div></td>
      <td>${x.n_student_years}</td></tr>`;
  }).join('')}</table>
  <div class="note">${t('teacherNote')}</div></div>`;
}

function vAbout() {
  if (lang === 'hy') {
    view.innerHTML = `<div class="prose">
    <h2>Ի՞նչ է Գիտակը</h2>

    աշխատեցնել փաստերի, ոչ թե ենթադրությունների վրա։ Բոլոր գնահատականները թվային են։

    որպես կրկնուսույցներ → հաջորդ քառորդը ցույց է տալիս՝ ստացվե՞ց։ Միավորները,

    գնահատում է առաջընթացն ու կայունությունը, ոչ միայն մակարդակը, այնպես որ բարձրացող

    <h2>Կանոններ, որոնց այս նախագիծը հետևում է</h2>

      դպրոց է. իրական դպրոցում բազան մնում է դպրոցի ներսում։</li>
      <li><b>Մոդելը խորհուրդ է տալիս, որոշում է ուսուցիչը։</b> Նշումը երեխային օգնելու

      արտահանելի է, և թե ինչով կիսվել հետագայում՝ իր ընտրությունն է։</li>

    <p lang="en">Gitak is an open-source platform for Armenian schools: every grade digital,

  view.innerHTML = `<div class="prose">

  <p>The yearly loop: each quarter ends with exams → the model retrains on the school's whole history →
  every student gets a forecast for every subject → struggling students are flagged with a reason →
  strong classmates are suggested as tutors → the next quarter tests whether it worked. Scores, badges
  and leaderboards make progress feel like a game; the score rewards improvement and consistency, not
  only raw level, so a climbing student is as visible as a top one.</p>
  <h2>Rules this project holds itself to</h2>

    <li><b>The model advises, the teacher decides.</b> A flag is a reason to help a child, never a label
    on one. No automatic consequences follow from a prediction.</li>
    <li><b>The record belongs to the student.</b> The lifetime transcript is exportable by the student,

    <li><b>Honesty about accuracy.</b> Every model run stores its holdout error next to its predictions.</li>

  աջակցության կարիք ունի։ Կոդը բաց է, երեխաների տվյալները՝ երբեք։</p>
  </div>`;

/* ---------------- chrome + router ---------------- */
function renderChrome() {
  document.documentElement.lang = lang;
  document.getElementById('tagline').textContent = t('tagline');
  document.getElementById('nav').innerHTML = `
    <a href="#overview">${t('navOverview')}</a><a href="#classes">${t('navClasses')}</a>
    <a href="#students">${t('navStudents')}</a><a href="#teachers">${t('navTeachers')}</a>
    <a href="#about">${t('navAbout')}</a>`;
  document.querySelectorAll('#lang button').forEach(b =>
    b.classList.toggle('on', b.dataset.l === lang));
}

async function route() {
  const h = location.hash || '#overview';
  document.querySelectorAll('#nav a').forEach(a =>
    a.classList.toggle('on',
      a.getAttribute('href') === h ||
      (a.getAttribute('href') === '#classes' && h.startsWith('#class/')) ||
      (a.getAttribute('href') === '#students' && h.startsWith('#student/')) ||
      (a.getAttribute('href') === '#overview' && (h === '' || h === '#overview'))));
  view.innerHTML = `<div class="loading">${t('loading')}</div>`;
  try {
    if (h.startsWith('#class/')) await vClass(h.split('/')[1]);
    else if (h.startsWith('#student/')) await vStudent(h.split('/')[1]);
    else if (h === '#classes') await vClasses();
    else if (h === '#students') await vStudents();
    else if (h === '#teachers') await vTeachers();
    else if (h === '#about') vAbout();
    else await vOverview();
  } catch (e) {
    view.innerHTML = `<div class="loading">${t('loadError', esc(e.message))}</div>`;
  }
}

document.getElementById('lang').addEventListener('click', (e) => {
  const b = e.target.closest('button[data-l]');
  if (!b || b.dataset.l === lang) return;
  lang = b.dataset.l;
  localStorage.setItem('gitak-lang', lang);
  renderChrome();
  route();
});

addEventListener('hashchange', route);
renderChrome();
route();
document.addEventListener('click', (e) => {
  const row = e.target.closest('[data-go]');
  if (row) location.hash = row.dataset.go;
});
document.addEventListener('mousemove', (e) => {
  const el = e.target.closest && e.target.closest('[data-tip]');
  if (el) showTip(esc(el.dataset.tip), e); else hideTip();
});
</script>
