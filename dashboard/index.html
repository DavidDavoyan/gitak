<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gitak · Գիտակ</title>
<style>
  :root {
    color-scheme: light;
    --page: #f9f9f7; --surface: #fcfcfb;
    --ink: #0b0b0b; --ink-2: #52514e; --muted: #898781;
    --grid: #e1e0d9; --axis: #c3c2b7; --border: rgba(11,11,11,.10);
    --s1: #2a78d6; --s1-soft: #9ec5f4; --s1-softer: #cde2fb;
    --good-text: #006300; --status-good: #0ca30c; --status-warn: #fab219;
    --status-serious: #ec835a; --status-crit: #d03b3b;
    --neutral-mid: #f0efec;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page: #0d0d0d; --surface: #1a1a19;
      --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
      --grid: #2c2c2a; --axis: #383835; --border: rgba(255,255,255,.10);
      --s1: #3987e5; --s1-soft: #1c5cab; --s1-softer: #184f95;
      --good-text: #0ca30c; --neutral-mid: #383835;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--page); color: var(--ink);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    padding: 14px 22px; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .logo { font-size: 19px; font-weight: 700; letter-spacing: .2px; }
  .logo small { color: var(--muted); font-weight: 400; margin-left: 6px; }
  .period { color: var(--ink-2); font-size: 12.5px; }
  nav { display: flex; gap: 4px; margin-left: auto; flex-wrap: wrap; }
  nav a {
    padding: 6px 12px; border-radius: 8px; text-decoration: none;
    color: var(--ink-2); font-weight: 500;
  }
  nav a.on { background: var(--s1); color: #fff; }
  nav a:not(.on):hover { background: var(--neutral-mid); }
  main { max-width: 1100px; margin: 0 auto; padding: 20px 22px 60px; }
  h2 { font-size: 17px; margin: 26px 0 10px; }
  h2:first-child { margin-top: 4px; }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 10px; }
  .tile {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px;
  }
  .tile .v { font-size: 26px; font-weight: 700; margin: 2px 0; }
  .tile .l { color: var(--muted); font-size: 11.5px; text-transform: uppercase; letter-spacing: .5px; }
  .tile .s { color: var(--ink-2); font-size: 12px; }
  .cards2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 800px) { .cards2 { grid-template-columns: 1fr; } }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
  }
  .card h3 { margin: 0 0 10px; font-size: 14px; }
  .card .note { color: var(--muted); font-size: 12px; margin-top: 8px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: var(--muted); font-size: 11.5px;
       text-transform: uppercase; letter-spacing: .4px; font-weight: 600;
       padding: 4px 8px; border-bottom: 1px solid var(--grid); }
  td { padding: 6px 8px; border-bottom: 1px solid var(--grid);
       font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: 0; }
  tr.click { cursor: pointer; }
  tr.click:hover td { background: var(--neutral-mid); }
  .up { color: var(--good-text); font-weight: 600; }
  .down { color: var(--status-crit); font-weight: 600; }
  .chip { display: inline-block; padding: 1px 8px; border-radius: 99px;
          font-size: 11.5px; font-weight: 600; }
  .chip.high { background: var(--status-crit); color: #fff; }
  .chip.medium { background: var(--status-warn); color: #422e00; }
  .bar-row { display: grid; grid-template-columns: 52px 1fr 34px; gap: 8px;
             align-items: center; padding: 3px 0; }
  .bar-row.wide { grid-template-columns: 190px 1fr 34px; }
  .bar-row .lbl { color: var(--ink-2); font-size: 12.5px; white-space: nowrap;
                  overflow: hidden; text-overflow: ellipsis; }
  .bar-row .n { text-align: right; font-variant-numeric: tabular-nums; font-size: 12.5px; }
  .bar-track { height: 10px; border-radius: 4px; background: transparent; }
  .bar-fill { height: 10px; border-radius: 4px; background: var(--s1); min-width: 2px; }
  .grid-classes { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 10px; }
  .cls {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; cursor: pointer;
  }
  .cls:hover { border-color: var(--s1); }
  .cls .t { font-size: 18px; font-weight: 700; }
  .cls .m { color: var(--ink-2); font-size: 12px; margin-top: 2px; }
  .search { display: flex; gap: 8px; margin-bottom: 14px; }
  .search input {
    flex: 1; max-width: 420px; padding: 9px 12px; border-radius: 10px;
    border: 1px solid var(--axis); background: var(--surface); color: var(--ink);
    font: inherit;
  }
  .btn {
    padding: 8px 14px; border-radius: 10px; border: 1px solid var(--axis);
    background: var(--surface); color: var(--ink); font: inherit; cursor: pointer;
  }
  .btn.primary { background: var(--s1); border-color: var(--s1); color: #fff; }
  a.plain { color: var(--s1); text-decoration: none; }
  a.plain:hover { text-decoration: underline; }
  .back { display: inline-block; margin-bottom: 12px; }
  .badges span { margin-right: 4px; }
  .spark-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 10px; }
  .spark-card { background: var(--surface); border: 1px solid var(--border);
                border-radius: 12px; padding: 10px 12px; }
  .spark-card .t { font-size: 12.5px; color: var(--ink-2); }
  .spark-card .hy { color: var(--muted); }
  .spark-card .last { font-weight: 700; font-size: 16px; }
  .spark-card.flagged { border-color: var(--status-crit); }
  svg text { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: var(--muted); }
  #tip {
    position: fixed; pointer-events: none; display: none; z-index: 10;
    background: var(--ink); color: var(--page); padding: 5px 9px;
    border-radius: 8px; font-size: 12px; max-width: 260px;
  }
  .muted { color: var(--muted); }
  .flag-reason { color: var(--ink-2); font-size: 12px; }
  .prose { max-width: 720px; }
  .prose p, .prose li { color: var(--ink-2); font-size: 13.5px; }
  .prose strong { color: var(--ink); }
  .loading { color: var(--muted); padding: 30px 0; }
  .va-cell { display: flex; align-items: center; gap: 6px; }
  .va-axis { position: relative; width: 140px; height: 10px; }
  .va-axis .mid { position: absolute; left: 50%; top: -2px; bottom: -2px;
                  width: 1px; background: var(--axis); }
  .va-axis .f { position: absolute; top: 0; height: 10px; border-radius: 4px; }
</style>
</head>
<body>
<header>
  <div class="logo">Գիտակ<small>Gitak · student performance, openly</small></div>
  <div class="period" id="period"></div>
  <nav id="nav">
    <a href="#overview">Overview</a><a href="#classes">Classes</a>
    <a href="#students">Students</a><a href="#teachers">Teachers</a>
    <a href="#about">About</a>
  </nav>
</header>
<main id="view"><div class="loading">Loading…</div></main>
<div id="tip"></div>
<script>
const $ = (h) => { const d = document.createElement('div'); d.innerHTML = h; return d; };
const view = document.getElementById('view');
const tip = document.getElementById('tip');
const esc = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const api = async (p) => (await fetch('/api' + p)).json();
const fmt = (x, d=2) => x == null ? '–' : (+x).toFixed(d);
const deltaHtml = (d) => d == null ? '<span class="muted">–</span>'
  : d >= 0 ? `<span class="up">▲ +${(+d).toFixed(2)}</span>`
           : `<span class="down">▼ ${(+d).toFixed(2)}</span>`;
const BADGE = { gold:'🥇', silver:'🥈', bronze:'🥉', riser:'🚀', perfect:'⭐', mentor:'🤝' };
const BADGE_NAME = { gold:'1st in class', silver:'2nd in class', bronze:'3rd in class',
  riser:'big improvement', perfect:'all subjects 9+', mentor:'helped a classmate improve' };
const riskChip = (r) => r === 'high'
  ? '<span class="chip high">▲ high risk</span>'
  : '<span class="chip medium">● medium</span>';

function showTip(html, ev) {
  tip.innerHTML = html; tip.style.display = 'block';
  const x = Math.min(ev.clientX + 14, innerWidth - 280);
  tip.style.left = x + 'px'; tip.style.top = (ev.clientY + 14) + 'px';
}
const hideTip = () => tip.style.display = 'none';

function sparkline(points, w=220, h=44, flagged=false) {
  if (!points.length) return '';
  const xs = points.map((_, i) => i), ys = points.map(p => p.avg);
  const x = i => 4 + i * (w - 30) / Math.max(xs.length - 1, 1);
  const y = v => h - 6 - (v - 1) * (h - 12) / 9;   /* fixed 1..10 scale */
  const path = points.map((p, i) => `${i ? 'L' : 'M'}${x(i).toFixed(1)},${y(p.avg).toFixed(1)}`).join('');
  const last = points[points.length - 1];
  const dots = points.map((p, i) =>
    `<circle cx="${x(i).toFixed(1)}" cy="${y(p.avg).toFixed(1)}" r="8" fill="transparent"
      data-tip="${esc(p.y)}-${String(p.y+1).slice(2)} Q${p.q}: ${p.avg.toFixed(1)}"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" class="spark">
    <line x1="4" y1="${y(6).toFixed(1)}" x2="${w-26}" y2="${y(6).toFixed(1)}"
      stroke="var(--grid)" stroke-dasharray="3 3"/>
    <path d="${path}" fill="none" stroke="${flagged ? 'var(--status-crit)' : 'var(--s1)'}"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${x(points.length-1).toFixed(1)}" cy="${y(last.avg).toFixed(1)}" r="3"
      fill="${flagged ? 'var(--status-crit)' : 'var(--s1)'}"/>
    ${dots}</svg>`;
}

function scoreChart(scores) {
  if (!scores.length) return '';
  const w = 760, h = 170, padL = 40, padR = 16, padT = 12, padB = 26;
  const x = i => padL + i * (w - padL - padR) / Math.max(scores.length - 1, 1);
  const y = v => padT + (1000 - v) * (h - padT - padB) / 1000;
  const path = scores.map((s, i) => `${i ? 'L' : 'M'}${x(i).toFixed(1)},${y(s.score).toFixed(1)}`).join('');
  const gridlines = [250, 500, 750, 1000].map(v =>
    `<line x1="${padL}" y1="${y(v)}" x2="${w-padR}" y2="${y(v)}" stroke="var(--grid)"/>
     <text x="${padL-6}" y="${y(v)+4}" text-anchor="end">${v}</text>`).join('');
  const ticks = scores.map((s, i) => s.q === 1 ?
    `<text x="${x(i)}" y="${h-8}" text-anchor="middle">${s.y}-${String(s.y+1).slice(2)}</text>` : '').join('');
  const dots = scores.map((s, i) =>
    `<circle cx="${x(i).toFixed(1)}" cy="${y(s.score).toFixed(1)}" r="9" fill="transparent"
       data-tip="${s.y}-${String(s.y+1).slice(2)} Q${s.q} — score ${s.score}, avg ${fmt(s.quarter_avg)}, rank ${s.rank_class}"/>
     <circle cx="${x(i).toFixed(1)}" cy="${y(s.score).toFixed(1)}" r="3" fill="var(--s1)" pointer-events="none"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%">
    ${gridlines}
    <line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="var(--axis)"/>
    ${ticks}
    <path d="${path}" fill="none" stroke="var(--s1)" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}</svg>`;
}

function bars(rows, max, wide=false) {
  return rows.map(r => `
    <div class="bar-row${wide ? ' wide' : ''}"><div class="lbl" title="${esc(r.label)}">${esc(r.label)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(2, 100*r.value/max)}%"></div></div>
      <div class="n">${r.value}</div></div>`).join('');
}

/* ---------------- views ---------------- */

async function vOverview() {
  const o = await api('/overview');
  if (o.empty) { view.innerHTML = '<div class="loading">No data yet. Run <code>python -m gitak demo</code>.</div>'; return; }
  document.getElementById('period').textContent =
    `history through ${o.period.latest_label} · planning ${o.period.target_label}`;
  const byClass = {}, bySubject = {};
  for (const h of o.heatmap) {
    byClass[h.class] = (byClass[h.class] || 0) + h.count;
    bySubject[h.subject + ' · ' + h.subject_hy] = (bySubject[h.subject + ' · ' + h.subject_hy] || 0) + h.count;
  }
  const clsRows = Object.entries(byClass).sort((a,b) => b[1]-a[1]).slice(0, 12)
    .map(([label, value]) => ({label, value}));
  const subjRows = Object.entries(bySubject).sort((a,b) => b[1]-a[1]).slice(0, 10)
    .map(([label, value]) => ({label, value}));
  const maxC = Math.max(...clsRows.map(r => r.value), 1);
  const maxS = Math.max(...subjRows.map(r => r.value), 1);
  const t = o.tutoring || {};
  view.innerHTML = `
  <div class="tiles">
    <div class="tile"><div class="l">Active students</div><div class="v">${o.n_students_active}</div>
      <div class="s">${o.n_classes} classes · ${o.n_teachers} teachers</div></div>
    <div class="tile"><div class="l">School average</div><div class="v">${fmt(o.school_avg)}</div>
      <div class="s">${deltaHtml(o.school_avg_delta)} vs previous quarter</div></div>
    <div class="tile"><div class="l">Flagged for ${esc(o.period.target_label)}</div>
      <div class="v">${o.flagged_students}</div>
      <div class="s">${o.flags_total} subject flags · ${o.flags_high} high risk</div></div>
    <div class="tile"><div class="l">Tutoring pairs</div><div class="v">${o.pairings_target}</div>
      <div class="s">strong students helping flagged ones</div></div>
    <div class="tile"><div class="l">Model accuracy</div>
      <div class="v">${o.model && o.model.mae != null ? '±' + fmt(o.model.mae) : '–'}</div>
      <div class="s">holdout error on a 10-point scale</div></div>
  </div>
  ${t.paired_delta != null && t.unpaired_delta != null ? `
  <h2>Does peer tutoring work here?</h2>
  <div class="card"><b>${t.paired_delta >= 0 ? '+' : ''}${fmt(t.paired_delta)}</b> average move per quarter
    for tutored students in the paired subject, vs <b>${t.unpaired_delta >= 0 ? '+' : ''}${fmt(t.unpaired_delta)}</b>
    for flagged students without a tutor (${t.n_paired} vs ${t.n_unpaired} student-quarters).
    <div class="note">Demo data simulates the tutoring effect; in a real school this number is the evidence.</div></div>` : ''}
  <h2>Where support is needed next quarter</h2>
  <div class="cards2">
    <div class="card"><h3>Flags by class</h3>${bars(clsRows, maxC)}</div>
    <div class="card"><h3>Flags by subject</h3>${bars(subjRows, maxS, true)}</div>
  </div>
  <div class="cards2" style="margin-top:12px">
    <div class="card"><h3>Support-program candidates (end of ${esc(o.period.latest_label).slice(0,7)})</h3>
      <table><tr><th>Student</th><th>Class</th><th>Weak subjects</th><th>Worst avg</th></tr>
      ${o.support_candidates.map(s => `<tr class="click" data-go="#student/${s.student_id}">
        <td>${esc(s.name)}</td><td>${esc(s.class)}</td>
        <td>${s.weak_subjects}/${s.subjects_total}</td><td>${fmt(s.worst_avg)}</td></tr>`).join('')}
      </table></div>
    <div class="card"><h3>Most improved last quarter</h3>
      <table><tr><th>Student</th><th>Class</th><th>Change</th><th>Avg</th><th>Score</th></tr>
      ${o.top_improved.map(s => `<tr class="click" data-go="#student/${s.student_id}">
        <td>${esc(s.name)}</td><td>${esc(s.class)}</td><td>${deltaHtml(s.delta)}</td>
        <td>${fmt(s.avg)}</td><td>${s.score}</td></tr>`).join('')}
      </table></div>
  </div>
  <p style="margin-top:16px"><button class="btn primary" id="rerun">Re-run analysis</button>
  <span class="muted" id="rerun-note"> retrains the model on all grades and refreshes flags and pairings</span></p>`;
  document.getElementById('rerun').onclick = async (e) => {
    e.target.disabled = true;
    document.getElementById('rerun-note').textContent = ' running…';
    const r = await fetch('/api/run/predict', {method: 'POST'}).then(r => r.json());
    document.getElementById('rerun-note').textContent =
      ` done: MAE ±${fmt(r.mae)} · ${r.n_flagged} flags · ${r.n_pairings} pairings`;
    e.target.disabled = false;
  };
}

async function vClasses() {
  const d = await api('/classes');
  view.innerHTML = `<h2>Classes · ${esc(d.period.target_label)} composition</h2>
  <div class="grid-classes">` + d.classes.map(c => `
    <div class="cls" data-go="#class/${c.id}"><div class="t">${esc(c.label)}</div>
      <div class="m">${c.n_students} students · avg ${fmt(c.avg)}</div>
      <div class="m">${c.flags ? c.flags + ' flags' : 'no flags'} next quarter</div>
    </div>`).join('') + '</div>';
}

async function vClass(id) {
  const d = await api('/classes/' + id);
  view.innerHTML = `
  <a class="plain back" href="#classes">← all classes</a>
  <h2 style="margin-top:0">Class ${esc(d.label)}</h2>
  <div class="cards2">
    <div class="card"><h3>Leaderboard · ${esc(d.period.latest_label)}</h3>
      <table><tr><th>#</th><th>Student</th><th>Score</th><th>Avg</th><th>Change</th><th>Badges</th></tr>
      ${d.roster.map(r => `<tr class="click" data-go="#student/${r.id}">
        <td>${r.rank_class ?? '–'}</td><td>${esc(r.first_name)} ${esc(r.last_name)}</td>
        <td><b>${r.score ?? '–'}</b></td><td>${fmt(r.quarter_avg)}</td>
        <td>${deltaHtml(r.delta)}</td>
        <td class="badges">${r.badges.map(b => `<span title="${BADGE_NAME[b]}">${BADGE[b]}</span>`).join('')}</td>
      </tr>`).join('')}</table></div>
    <div>
      <div class="card"><h3>Needs support in ${esc(d.period.target_label)}</h3>
      ${d.flags.length ? `<table><tr><th>Student</th><th>Subject</th><th>Forecast</th><th>Risk</th></tr>
        ${d.flags.map(f => `<tr class="click" data-go="#student/${f.student_id}">
          <td>${esc(f.name)}</td><td>${esc(f.subject)} <span class="muted">· ${esc(f.subject_hy)}</span></td>
          <td>${fmt(f.predicted, 1)}</td><td>${riskChip(f.risk)}</td></tr>
          <tr><td colspan="4" class="flag-reason">${esc(f.reason)}</td></tr>`).join('')}</table>`
        : '<div class="muted">No flags for this class.</div>'}</div>
      <div class="card" style="margin-top:12px"><h3>Suggested tutoring pairs</h3>
      ${d.pairings.length ? `<table><tr><th>Subject</th><th>Tutor</th><th>Helps</th></tr>
        ${d.pairings.map(p => `<tr><td>${esc(p.subject)}</td>
          <td><a class="plain" href="#student/${p.tutor_id}">${esc(p.tutor)}</a></td>
          <td><a class="plain" href="#student/${p.tutee_id}">${esc(p.tutee)}</a></td></tr>`).join('')}</table>`
        : '<div class="muted">No pairings suggested.</div>'}</div>
    </div>
  </div>`;
}

async function vStudents() {
  view.innerHTML = `<h2>Students</h2>
  <div class="search"><input id="q" placeholder="Search by name, e.g. Ani…" autofocus></div>
  <div id="results" class="muted">Type at least two letters.</div>`;
  const input = document.getElementById('q');
  let tId;
  input.oninput = () => {
    clearTimeout(tId);
    tId = setTimeout(async () => {
      const q = input.value.trim();
      const box = document.getElementById('results');
      if (q.length < 2) { box.textContent = 'Type at least two letters.'; return; }
      const r = await api('/search?q=' + encodeURIComponent(q));
      box.innerHTML = r.results.length
        ? '<table><tr><th>Student</th><th>Class</th></tr>' + r.results.map(s =>
          `<tr class="click" data-go="#student/${s.id}"><td>${esc(s.name)}</td><td>${esc(s.class)}</td></tr>`).join('') + '</table>'
        : 'No students found.';
    }, 200);
  };
}

async function vStudent(id) {
  const p = await api('/students/' + id);
  const latest = p.scores[p.scores.length - 1];
  const flaggedSubjects = new Set(p.flags.map(f => f.subject));
  const badgeCounts = {};
  for (const b of p.badges) badgeCounts[b.code] = (badgeCounts[b.code] || 0) + 1;
  view.innerHTML = `
  <a class="plain back" href="javascript:history.back()">← back</a>
  <h2 style="margin-top:0">${esc(p.name)}
    <span class="muted" style="font-weight:400">· class ${esc(p.class)} ·
    ${p.status === 'graduated' ? 'graduated' : 'grade ' + p.grade_level}</span></h2>
  <div class="tiles">
    <div class="tile"><div class="l">Gitak score</div><div class="v">${latest ? latest.score : '–'}</div>
      <div class="s">rank ${latest ? latest.rank_class : '–'} in class</div></div>
    <div class="tile"><div class="l">Quarter average</div><div class="v">${latest ? fmt(latest.quarter_avg) : '–'}</div>
      <div class="s">${latest ? deltaHtml(latest.delta) : ''} vs previous</div></div>
    <div class="tile"><div class="l">Badges</div>
      <div class="v badges">${Object.entries(badgeCounts).map(([c, n]) =>
        `<span title="${BADGE_NAME[c]}">${BADGE[c]}${n > 1 ? '×' + n : ''}</span>`).join('') || '–'}</div>
      <div class="s">earned over ${p.scores.length} quarters</div></div>
    <div class="tile"><div class="l">Peer tutoring</div>
      <div class="v">${p.times_tutor}🤝${p.times_tutee.length}</div>
      <div class="s">times tutor · times helped</div></div>
  </div>
  <h2>Score history <span class="muted" style="font-size:12px;font-weight:400">0-1000: level + improvement + consistency</span></h2>
  <div class="card">${scoreChart(p.scores)}</div>
  ${p.flags.length ? `<h2>Flagged for ${esc(p.period.target_label)}</h2>
  <div class="card"><table><tr><th>Subject</th><th>Forecast</th><th>Risk</th><th>Why</th></tr>
    ${p.flags.map(f => `<tr><td>${esc(f.subject)} <span class="muted">· ${esc(f.subject_hy)}</span></td>
      <td>${fmt(f.predicted, 1)}</td><td>${riskChip(f.risk)}</td>
      <td class="flag-reason">${esc(f.reason)}</td></tr>`).join('')}</table></div>` : ''}
  ${p.tracks ? `<h2>University tracks <span class="muted" style="font-size:12px;font-weight:400">from this year's subject strengths</span></h2>
  <div class="card">${p.tracks.map(t => `
    <div class="bar-row"><div class="lbl">${esc(t.track)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(t.readiness*100).toFixed(0)}%"></div></div>
      <div class="n">${fmt(t.avg, 1)}</div></div>`).join('')}
    <div class="note">Readiness relative to the 10-point scale; a guide for the student's own choice, not a gate.</div></div>` : ''}
  <h2>Subjects · quarter averages since ${p.scores.length ? p.scores[0].y : ''}</h2>
  <div class="spark-grid">${p.subjects.map(s => {
    const flagged = flaggedSubjects.has(s.subject);
    const last = s.points[s.points.length - 1];
    return `<div class="spark-card${flagged ? ' flagged' : ''}">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div class="t">${esc(s.subject)} <span class="hy">· ${esc(s.subject_hy)}</span></div>
        <div class="last">${fmt(last.avg, 1)}</div></div>
      ${sparkline(s.points, 220, 44, flagged)}</div>`;
  }).join('')}</div>
  <p style="margin-top:16px"><a class="plain" href="/api/students/${p.id}/transcript.json">
  Download lifetime transcript (JSON)</a> <span class="muted">· the full record, owned by the student</span></p>`;
}

async function vTeachers() {
  const d = await api('/teachers');
  const maxAbs = Math.max(...d.teachers.map(t => Math.abs(t.value_added)), 0.01);
  view.innerHTML = `<h2>Teacher value-added</h2>
  <div class="card">
  <table><tr><th>Teacher</th><th>Subject</th><th>Value-added</th><th></th><th>Student-years</th></tr>
  ${d.teachers.map(t => {
    const w = Math.abs(t.value_added) / maxAbs * 50;
    const pos = t.value_added >= 0;
    return `<tr><td>${esc(t.name)}</td>
      <td>${esc(t.subject)} <span class="muted">· ${esc(t.subject_hy)}</span></td>
      <td class="${pos ? 'up' : 'down'}">${pos ? '+' : ''}${fmt(t.value_added, 2)}</td>
      <td><div class="va-axis"><div class="mid"></div>
        <div class="f" style="${pos
          ? `left:50%;width:${w}%;background:var(--s1)`
          : `right:50%;width:${w}%;background:var(--status-crit)`}"></div></div></td>
      <td>${t.n_student_years}</td></tr>`;
  }).join('')}</table>
  <div class="note">Growth of the teacher's students (Q4 vs Q1) compared with school-wide growth for the
  same subject and grade level. A teacher who inherits a weak class is not punished for it, and one who
  inherits a strong class gets no free credit.</div></div>`;
}

function vAbout() {
  view.innerHTML = `<div class="prose">
  <h2>What Gitak is</h2>
  <p><b>Գիտակ</b> (Gitak, "the one who knows") is an open-source platform for making an Armenian school
  run on evidence instead of guesswork. Every grade is digital. Every student has a story the school can
  see and act on: not just the 10 strongest in a class of 30, but all 30.</p>
  <p>The yearly loop: each quarter ends with exams → the model retrains on the school's whole history →
  every student gets a forecast for every subject → struggling students are flagged with a reason →
  strong classmates are suggested as tutors → the next quarter tests whether it worked. Scores, badges
  and leaderboards make progress feel like a game; the score rewards improvement and consistency, not
  only raw level, so a climbing student is as visible as a top one.</p>
  <h2>Rules this project holds itself to</h2>
  <ul>
    <li><b>The code is public. Children's data never is.</b> This demo runs entirely on a synthetic
    school; a real deployment keeps its database inside the school.</li>
    <li><b>The model advises, the teacher decides.</b> A flag is a reason to help a child, never a label
    on one. No automatic consequences follow from a prediction.</li>
    <li><b>The record belongs to the student.</b> The lifetime transcript is exportable by the student,
    and what is shared later in life is their choice.</li>
    <li><b>Honesty about accuracy.</b> Every model run stores its holdout error next to its predictions.</li>
  </ul>
  <p lang="hy">Գիտակը բաց հարթակ է հայկական դպրոցների համար. բոլոր գնահատականները թվային են,
  յուրաքանչյուր աշակերտ ունի իր պատմությունը, և ուսուցիչը ամեն քառորդից առաջ գիտի, թե ով որ առարկայում
  աջակցության կարիք ունի: Կոդը բաց է, երեխաների տվյալները՝ երբեք:</p>
  </div>`;
}

/* ---------------- router ---------------- */
async function route() {
  const h = location.hash || '#overview';
  document.querySelectorAll('#nav a').forEach(a =>
    a.classList.toggle('on', h.startsWith(a.getAttribute('href').split('/')[0]) &&
      (a.getAttribute('href') === h || h.startsWith(a.getAttribute('href')) ||
       (a.getAttribute('href') === '#classes' && h.startsWith('#class/')) ||
       (a.getAttribute('href') === '#students' && h.startsWith('#student/')))));
  view.innerHTML = '<div class="loading">Loading…</div>';
  try {
    if (h.startsWith('#class/')) await vClass(h.split('/')[1]);
    else if (h.startsWith('#student/')) await vStudent(h.split('/')[1]);
    else if (h === '#classes') await vClasses();
    else if (h === '#students') await vStudents();
    else if (h === '#teachers') await vTeachers();
    else if (h === '#about') vAbout();
    else await vOverview();
  } catch (e) {
    view.innerHTML = `<div class="loading">Could not load this view (${esc(e.message)}).</div>`;
  }
}
addEventListener('hashchange', route);
route();
api('/overview').then(o => {
  if (!o.empty) document.getElementById('period').textContent =
    `history through ${o.period.latest_label} · planning ${o.period.target_label}`;
});
document.addEventListener('click', (e) => {
  const row = e.target.closest('[data-go]');
  if (row) location.hash = row.dataset.go;
});
document.addEventListener('mousemove', (e) => {
  const el = e.target.closest && e.target.closest('[data-tip]');
  if (el) showTip(esc(el.dataset.tip), e); else hideTip();
});
</script>
</body>
</html>
